name: Build APK
on:
  push:
    branches: [ main ]
jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - name: Build APK with Docker
        run: |
          docker run --rm \
          -v ${{ github.workspace }}:/home/user/hostcwd \
          kivy/buildozer:latest \
          bash -c "yes | sdkmanager --licenses && yes | sdkmanager 'build-tools;33.0.2' 'platforms;android-31' && buildozer android debug"
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: LeapYear
          path: bin/*.apk
