name: Build APK
on:
  push:
    branches: [ main ]
env:
  FLET_CLI_NO_RICH_OUTPUT: 1
  PYTHONUTF8: 1
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Setup uv
        uses: astral-sh/setup-uv@v6
        with:
          python-version: '3.12'

      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.22.2'

      - name: Install Flet
        run: uv pip install flet --system

      - name: Build APK
        run: |
          flutter config --no-analytics
          flet build apk \
          --yes \
          --project "简约闰年查询" \
          --bundle-id com.zyk.leapyear \
          --build-version 1.0.0 \
          --split-per-abi \
          --verbose

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: 简约闰年查询
          path: build/apk/*.apk
